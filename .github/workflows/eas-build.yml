name: EAS Build Produção

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build de produção na EAS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Expo e EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalar dependências
        run: npm ci

      - name: Rodar build na EAS
        run: |
          eas build \
            --platform android \
            --profile production \
            --auto-submit \
            --non-interactive \
            --no-wait
