name: EAS Build Produção

on:
  push:
    tags:
      - android
      - ios
      - build

jobs:
  build:
    name: Build de produção na EAS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Expo e EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalar dependências
        run: npm ci

      - name: Definir plataforma
        id: platform
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$TAG" = "android" ]; then
            echo "platform=android" >> $GITHUB_OUTPUT
          elif [ "$TAG" = "ios" ]; then
            echo "platform=ios" >> $GITHUB_OUTPUT
          else
            echo "platform=all" >> $GITHUB_OUTPUT
          fi

      - name: Rodar build na EAS
        run: |
          eas build \
            --platform ${{ steps.platform.outputs.platform }} \
            --profile production \
            --auto-submit \
            --non-interactive \
            --no-wait
